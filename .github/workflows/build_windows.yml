name: Build Windows installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar ejecutable (PyInstaller)
        run: pyinstaller packaging/mvpm.spec --distpath dist --workpath build --noconfirm

      - name: Instalar Inno Setup
        run: choco install innosetup -y

      - name: Compilar instalador (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\instalador.iss

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: MVProjectManagement-Setup-Windows
          path: packaging/Output/*.exe

      - name: Publicar en el release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/*.exe
